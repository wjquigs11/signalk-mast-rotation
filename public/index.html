<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mast Rotation Angle</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1 style="text-align: center;">Mast Rotation Angle</h1>
        
        <div class="arc-container">
            <canvas id="arcCanvas" width="400" height="400"></canvas>
        </div>
        
        <div class="value-display">
            Mast Angle: <span id="angle-degrees" class="value">0.0</span>°
        </div>
        <div class="value-display">
            AWA: <span id="awa-value" class="value">0.0</span>° | 
            AWS: <span id="aws-value" class="value">0.0</span> kts | 
            Correct AWA: <span id="correct-awa-value" class="value">0.0</span>°
        </div>
        
        <div class="toggle-container">
            <label class="toggle-label">
                <span>Wind Correction</span>
                <label class="switch">
                    <input type="checkbox" id="wind-correction-toggle" checked>
                    <span class="slider"></span>
                </label>
            </label>
        </div>
        
        <div class="controls">
            <button id="center-btn">Center</button>
            <button id="reset-btn">Reset</button>
        </div>
    </div>

    <script>
        let mastAngle = 0;
        // Helper port for API calls
        const mastRotHelperPort = 3333; // Default port, can be overridden by server
        let statusInterval;
        
        function updateStatus() {
            // Get status from the mastrot.js API server
            const host = window.location.hostname;
            const port = mastRotHelperPort || 3333;
            
            fetch(`http://${host}:${port}/api/status`, {
                method: 'GET'
            })
            .then(response => response.json())
            .then(data => {
                // Update mast angle
                updateMastAngle(data.mastAngle);
                
                // Update wind data
                document.getElementById('awa-value').textContent = data.inputAWADegrees.toFixed(1);
                // Convert AWS from m/s to knots (1 m/s = 1.94384 knots)
                const awsKnots = data.inputAWS * 1.94384;
                document.getElementById('aws-value').textContent = awsKnots.toFixed(2);
                document.getElementById('correct-awa-value').textContent = data.outputAWADegrees.toFixed(1);
            })
            .catch(error => {
                console.error('Error fetching status:', error);
            });
        }
        
        function startStatusPolling() {
            // Update immediately
            updateStatus();
            // Then update every second
            statusInterval = setInterval(updateStatus, 1000);
        }
        
        function stopStatusPolling() {
            if (statusInterval) {
                clearInterval(statusInterval);
            }
        }
        
        // Initialize arc
        let arcCanvas;
        
        function updateMastAngle(angle) {
            mastAngle = angle;
            
            // Update arc visualization
            if (arcCanvas) {
                arcCanvas.update(angle);
            }
            
            // Update text display
            const degrees = (angle * 180 / Math.PI).toFixed(1);
            document.getElementById('angle-degrees').textContent = degrees;
        }
        
        // Initialize arc visualization
        function initArc() {
            const canvas = document.getElementById('arcCanvas');
            const ctx = canvas.getContext('2d');
            
            // Center point
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = 150;
            
            arcCanvas = {
                update: function(angle) {
                    // Clear canvas
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    
                    // Draw the arc - adjust to start from -PI/2 (top) and go 180 degrees
                    ctx.beginPath();
                    ctx.arc(centerX, centerY, radius, 0, Math.PI); // Half circle (180 degrees) starting from right side
                    ctx.strokeStyle = 'black';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    
                    // Draw the radius line
                    // Adjust angle to make 0 point vertically downward (add PI/2)
                    const adjustedAngle = angle + Math.PI/2; // Add PI/2 to make 0 point vertically downward
                    const endX = centerX + radius * Math.cos(adjustedAngle);
                    const endY = centerY + radius * Math.sin(adjustedAngle);
                    
                    ctx.beginPath();
                    ctx.moveTo(centerX, centerY);
                    ctx.lineTo(endX, endY);
                    ctx.strokeStyle = 'black';
                    ctx.lineWidth = 3;
                    ctx.stroke();
                    
                    // Draw center point
                    ctx.beginPath();
                    ctx.arc(centerX, centerY, 5, 0, Math.PI * 2);
                    ctx.fillStyle = 'black';
                    ctx.fill();
                }
            };
            
            // Initial draw
            arcCanvas.update(0);
        }
        
        // Initialize when the page loads
        window.addEventListener('DOMContentLoaded', function() {
            initArc();
            startStatusPolling();
            
            // Get initial wind correction state
            const host = window.location.hostname;
            const port = mastRotHelperPort || 3333;
            
            fetch(`http://${host}:${port}/api/wind-correction`, {
                method: 'GET'
            })
            .then(response => response.json())
            .then(data => {
                console.log('Initial wind correction state:', data);
                if (data.enabled !== undefined) {
                    document.getElementById('wind-correction-toggle').checked = data.enabled;
                }
            })
            .catch(error => {
                console.error('Error getting wind correction state:', error);
            });
            
            // Set up toggle handler
            document.getElementById('wind-correction-toggle').addEventListener('change', function(e) {
                const isEnabled = e.target.checked;
                console.log('Wind correction:', isEnabled ? 'ON' : 'OFF');
                
                // Send toggle state to the mastrot.js API server
                const host = window.location.hostname;
                const port = mastRotHelperPort || 3333;
                
                fetch(`http://${host}:${port}/api/wind-correction?enabled=${isEnabled}`, {
                    method: 'GET'
                })
                .then(response => response.json())
                .then(data => {
                    console.log('Wind correction toggle response:', data);
                })
                .catch(error => {
                    console.error('Error toggling wind correction:', error);
                });
            });
            
            // Set up button handlers
            document.getElementById('center-btn').addEventListener('click', function() {
                // Send center command directly to the mastrot.js API server
                const host = window.location.hostname;
                const port = mastRotHelperPort || 3333; // Use the port from configuration or default to 3333
                
                // Direct API call to mastrot.js
                fetch(`http://${host}:${port}/api/center?action=center`, {
                    method: 'GET'
                })
                .then(response => response.json())
                .then(data => {
                    console.log('Center response:', data);
                })
                .catch(error => {
                    console.error('Error centering:', error);
                    // Fallback to the original route if direct API call fails
                    //fetch(`/plugins/mastrot/api/center?action=center`, {
                    //    method: 'GET'
                    //})
                    //.then(response => response.json())
                    //.then(data => {
                    //    console.log('Center response (fallback):', data);
                    //})
                    //.catch(err => {
                    //    console.error('Error centering (fallback):', err);
                    //});
                });
            });
            
            document.getElementById('reset-btn').addEventListener('click', function() {
                // Send reset command directly to the mastrot.js API server
                const host = window.location.hostname;
                const port = mastRotHelperPort || 3333; // Use the port from configuration or default to 3333
                
                // Direct API call to mastrot.js
                fetch(`http://${host}:${port}/api/reset?action=reset`, {
                    method: 'GET'
                })
                .then(response => response.json())
                .then(data => {
                    console.log('Reset response:', data);
                })
                .catch(error => {
                    console.error('Error resetting:', error);
                    // Fallback to the original route if direct API call fails
                    //fetch(`/plugins/mastrot/api/reset?action=reset`, {
                    //    method: 'GET'
                    //})
                    //.then(response => response.json())
                    //.then(data => {
                    //    console.log('Reset response (fallback):', data);
                    //})
                    //.catch(err => {
                    //    console.error('Error resetting (fallback):', err);
                    //});
                });
            });
        });
    </script>
</body>
</html>
