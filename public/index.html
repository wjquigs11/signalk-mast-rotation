<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mast Rotation Angle</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1 style="text-align: center;">Mast Rotation Angle</h1>
        
        <div class="arc-container">
            <canvas id="arcCanvas" width="400" height="400"></canvas>
        </div>
        
        <div class="value-display">
            Mast Angle: <span id="angle-degrees" class="value">0.0</span>°
        </div>
        <div class="value-display">
            AWA: <span id="awa-value" class="value">0.0</span>° | 
            AWS: <span id="aws-value" class="value">0.0</span> kts | 
            Correct AWA: <span id="correct-awa-value" class="value">0.0</span>°
        </div>
        <div class="value-display">
            Boat Heading: <span id="boat-heading" class="value">0.0</span>° |
            Mast Heading: <span id="mast-heading" class="value">0.0</span>°
        </div>
        
        <div class="toggle-container">
            <label class="toggle-label">
                <span>Wind Correction</span>
                <label class="switch">
                    <input type="checkbox" id="wind-correction-toggle" checked>
                    <span class="slider"></span>
                </label>
            </label>
        </div>
        
        <div class="controls">
            <button id="center-btn">Center</button>
            <button id="reset-btn">Reset</button>
        </div>
    </div>

    <script>
        let mastAngle = 0;
        let statusInterval;
        let apiBase = 'http://10.1.1.1:3333/api'; // default, overridden by config

        async function loadConfig() {
            try {
                const res = await fetch('/plugins/mastrot/config');
                if (!res.ok) throw new Error('config fetch failed');
                const cfg = await res.json();
                const mastHost = cfg.mastHost || '10.1.1.1';
                const mastRotHelperPort = cfg.mastRotHelperPort || 3333;
                apiBase = `http://${mastHost}:${mastRotHelperPort}/api`;
                console.log(`config loaded: apiBase=${apiBase}`);
            } catch (e) {
                console.warn('Could not load config, using default apiBase:', apiBase);
            }
        }

        function updateStatus() {
            fetch(`${apiBase}/status`)
            .then(response => response.json())
            .then(data => {
                updateMastAngle(data.mastAngle);
                document.getElementById('awa-value').textContent = data.inputAWADegrees.toFixed(1);
                const awsKnots = data.inputAWS * 1.94384;
                document.getElementById('aws-value').textContent = awsKnots.toFixed(2);
                document.getElementById('correct-awa-value').textContent = data.outputAWADegrees.toFixed(1);
                document.getElementById('boat-heading').textContent = (data.boatHeading * 180 / Math.PI).toFixed(1);
                document.getElementById('mast-heading').textContent = (data.canHeading * 180 / Math.PI).toFixed(1);
            })
            .catch(error => {
                console.error('Error fetching status:', error);
            });
        }
        
        function startStatusPolling() {
            // Update immediately
            updateStatus();
            // Then update every second
            statusInterval = setInterval(updateStatus, 1000);
        }
        
        function stopStatusPolling() {
            if (statusInterval) {
                clearInterval(statusInterval);
            }
        }
        
        // Initialize arc
        let arcCanvas;
        
        function updateMastAngle(angle) {
            mastAngle = angle;
            
            // Update arc visualization
            if (arcCanvas) {
                arcCanvas.update(angle);
            }
            
            // Update text display
            const degrees = (angle * 180 / Math.PI).toFixed(1);
            document.getElementById('angle-degrees').textContent = degrees;
        }
        
        // Initialize arc visualization
        function initArc() {
            const canvas = document.getElementById('arcCanvas');
            const ctx = canvas.getContext('2d');
            
            // Center point
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = 150;
            
            arcCanvas = {
                update: function(angle) {
                    // Clear canvas
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    
                    // Draw the arc - adjust to start from -PI/2 (top) and go 180 degrees
                    ctx.beginPath();
                    ctx.arc(centerX, centerY, radius, 0, Math.PI); // Half circle (180 degrees) starting from right side
                    ctx.strokeStyle = 'black';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    
                    // Draw the radius line
                    // Adjust angle to make 0 point vertically downward (add PI/2)
                    const adjustedAngle = angle + Math.PI/2; // Add PI/2 to make 0 point vertically downward
                    const endX = centerX + radius * Math.cos(adjustedAngle);
                    const endY = centerY + radius * Math.sin(adjustedAngle);
                    
                    ctx.beginPath();
                    ctx.moveTo(centerX, centerY);
                    ctx.lineTo(endX, endY);
                    ctx.strokeStyle = 'black';
                    ctx.lineWidth = 3;
                    ctx.stroke();
                    
                    // Draw center point
                    ctx.beginPath();
                    ctx.arc(centerX, centerY, 5, 0, Math.PI * 2);
                    ctx.fillStyle = 'black';
                    ctx.fill();
                }
            };
            
            // Initial draw
            arcCanvas.update(0);
        }
        
        // Initialize when the page loads
        window.addEventListener('DOMContentLoaded', async function() {
            await loadConfig();
            initArc();
            startStatusPolling();
            
            // Get initial wind correction state
            fetch(`${apiBase}/wind-correction`)
            .then(response => response.json())
            .then(data => {
                if (data.enabled !== undefined) {
                    document.getElementById('wind-correction-toggle').checked = data.enabled;
                }
            })
            .catch(error => {
                console.error('Error getting wind correction state:', error);
            });
            
            document.getElementById('wind-correction-toggle').addEventListener('change', function(e) {
                const isEnabled = e.target.checked;
                fetch(`${apiBase}/wind-correction?enabled=${isEnabled}`)
                .then(response => response.json())
                .then(data => console.log('Wind correction toggle response:', data))
                .catch(error => console.error('Error toggling wind correction:', error));
            });
            
            document.getElementById('center-btn').addEventListener('click', function() {
                fetch(`${apiBase}/center`)
                  .then(res => res.json())
                  .then(data => console.log('Center result:', data))
                  .catch(err => console.error('Error sending center command:', err));
            });
            
            document.getElementById('reset-btn').addEventListener('click', function() {
                fetch(`${apiBase}/reset`)
                .then(response => response.json())
                .then(data => console.log('Reset response:', data))
                .catch(error => console.error('Error resetting:', error));
            });
        });
    </script>
</body>
</html>
