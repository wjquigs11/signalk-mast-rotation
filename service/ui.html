<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mast Rotation Angle</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1 style="text-align: center;">Mast Rotation Angle</h1>

        <div class="arc-container">
            <canvas id="arcCanvas" width="400" height="400"></canvas>
        </div>

        <div class="value-display">
            Mast Angle (mag): <span id="angle-mag-degrees" class="value">—</span>°
            &nbsp;|&nbsp;
            Mast Angle (true): <span id="angle-true-degrees" class="value" style="color:#1a6fc4;">—</span>°
            &nbsp;<span id="honey-display" style="display:none;">|&nbsp;
            Mast Angle (honey): <span id="angle-honey-degrees" class="value" style="color:#c47a1a;">—</span>°</span>
        </div>

        <div class="arc-legend">
            <span class="legend-item"><span class="legend-swatch" style="background:#222;"></span> Magnetic</span>
            <span class="legend-item"><span class="legend-swatch" style="background:#1a6fc4;"></span> True</span>
            <span id="honey-legend" class="legend-item" style="display:none;"><span class="legend-swatch" style="background:#c47a1a;"></span> Honeywell</span>
        </div>

        <div class="arc-container">
            <canvas id="awaCanvas" width="300" height="300"></canvas>
        </div>

        <div class="value-display">
            AWA: <span id="awa-value" class="value">0.0</span>° |
            AWS: <span id="aws-value" class="value">0.0</span> kts |
            Correct AWA: <span id="correct-awa-value" class="value" style="color:blue;">0.0</span>°
        </div>
        <div class="value-display">
            Boat Hdg pypilot (true): <span id="boat-heading-pypilot-true" class="value" style="color:#1a6fc4;">—</span>° |
            Boat Hdg RTK (true): <span id="boat-heading-rtk-true" class="value" style="color:#2a9d2a;">—</span>° |
            Boat Hdg ESP (mag): <span id="boat-heading-esp-mag" class="value" style="color:#9d2a9d;">—</span>°
        </div>
        <div class="value-display">
            Mag Variation: <span id="mag-variation" class="value" style="color:#666;">—</span>° |
            Mast Hdg: <span id="mast-heading" class="value">0.0</span>° (adj: <span id="mast-heading-adj" class="value">0.0</span>°)
        </div>

        <div class="toggle-container">
            <label class="toggle-label">
                <span>Wind Correction</span>
                <label class="switch">
                    <input type="checkbox" id="wind-correction-toggle" checked>
                    <span class="slider"></span>
                </label>
            </label>
        </div>

        <div class="controls">
            <button id="center-btn">Center</button>
            <button id="reset-btn">Reset</button>
        </div>
    </div>

    <script>
        let mastAngleMag = null;
        let mastAngleTrue = null;
        let mastAngleHoney = null;
        let honeyEnabled = false;
        let statusInterval;
        let apiBase = '/api';

        async function loadConfig() {
            try {
                const res = await fetch('/api-config');
                const cfg = await res.json();
                apiBase = cfg.apiBase;
            } catch (e) {
                console.warn('Could not load config:', e);
            }
        }

        function rad2deg(r) { return r * 180 / Math.PI; }

        function updateStatus() {
            fetch(`${apiBase}/status`)
            .then(r => r.json())
            .then(data => {
                // Mast angles
                mastAngleMag  = data.mastAngleMag;
                mastAngleTrue = data.mastAngleTrue;
                mastAngleHoney = data.mastAngleHoney;

                // Show/hide honey elements based on server config
                if (data.honeyEnabled && !honeyEnabled) {
                    honeyEnabled = true;
                    document.getElementById('honey-display').style.display = 'inline';
                    document.getElementById('honey-legend').style.display  = 'inline-flex';
                }

                const magDeg   = mastAngleMag   !== null ? rad2deg(mastAngleMag).toFixed(1)   : '—';
                const trueDeg  = mastAngleTrue  !== null ? rad2deg(mastAngleTrue).toFixed(1)  : '—';
                const honeyDeg = mastAngleHoney !== null ? rad2deg(mastAngleHoney).toFixed(1) : '—';
                document.getElementById('angle-mag-degrees').textContent   = magDeg;
                document.getElementById('angle-true-degrees').textContent  = trueDeg;
                document.getElementById('angle-honey-degrees').textContent = honeyDeg;

                arcCanvas.update(mastAngleMag, mastAngleTrue, mastAngleHoney);

                // Wind
                document.getElementById('awa-value').textContent         = data.inputAWADegrees.toFixed(1);
                document.getElementById('aws-value').textContent         = (data.inputAWS * 1.94384).toFixed(2);
                document.getElementById('correct-awa-value').textContent = data.outputAWADegrees.toFixed(1);

                // Headings
                const bPypilotTrue = data.boatHeadingPypilotTrue != null ? rad2deg(data.boatHeadingPypilotTrue).toFixed(1) : '—';
                const bRTKTrue     = data.boatHeadingRTKTrue != null ? rad2deg(data.boatHeadingRTKTrue).toFixed(1) : '—';
                const bESPMag      = data.boatHeadingESPMag != null ? rad2deg(data.boatHeadingESPMag).toFixed(1) : '—';
                const magVar       = data.magneticVariation != null ? rad2deg(data.magneticVariation).toFixed(1) : '—';
                document.getElementById('boat-heading-pypilot-true').textContent = bPypilotTrue;
                document.getElementById('boat-heading-rtk-true').textContent     = bRTKTrue;
                document.getElementById('boat-heading-esp-mag').textContent      = bESPMag;
                document.getElementById('mag-variation').textContent             = magVar;
                document.getElementById('mast-heading').textContent      = rad2deg(data.canHeading).toFixed(1);
                document.getElementById('mast-heading-adj').textContent  = rad2deg(data.canHeadingAdjusted).toFixed(1);

                updateAWACircle(data.inputAWADegrees, data.outputAWADegrees);
            })
            .catch(err => console.error('Error fetching status:', err));
        }

        function startStatusPolling() {
            updateStatus();
            statusInterval = setInterval(updateStatus, 1000);
        }

        // ── Mast arc canvas ──────────────────────────────────────────────────
        let arcCanvas;

        function initArc() {
            const canvas = document.getElementById('arcCanvas');
            const ctx    = canvas.getContext('2d');
            const cx     = canvas.width  / 2;
            const cy     = canvas.height / 2;
            const r      = 150;

            function drawNeedle(angle, color, width) {
                const a = angle + Math.PI / 2;
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.lineTo(cx + r * Math.cos(a), cy + r * Math.sin(a));
                ctx.strokeStyle = color;
                ctx.lineWidth   = width || 3;
                ctx.stroke();
            }

            arcCanvas = {
                update: function(angleMag, angleTrue, angleHoney) {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);

                    ctx.beginPath();
                    ctx.arc(cx, cy, r, 0, Math.PI);
                    ctx.strokeStyle = '#aaa';
                    ctx.lineWidth   = 2;
                    ctx.stroke();

                    [[-Math.PI/2, 'port'], [0, 'fwd'], [Math.PI/2, 'stbd']].forEach(([a, label]) => {
                        const ta = a + Math.PI / 2;
                        ctx.beginPath();
                        ctx.moveTo(cx + (r - 10) * Math.cos(ta), cy + (r - 10) * Math.sin(ta));
                        ctx.lineTo(cx + (r + 10) * Math.cos(ta), cy + (r + 10) * Math.sin(ta));
                        ctx.strokeStyle = '#bbb';
                        ctx.lineWidth   = 1;
                        ctx.stroke();
                    });

                    if (angleHoney !== null) drawNeedle(angleHoney, '#c47a1a', 2);
                    if (angleMag !== null)   drawNeedle(angleMag,   '#222',    3);
                    if (angleTrue !== null)  drawNeedle(angleTrue,  '#1a6fc4', 3);

                    ctx.beginPath();
                    ctx.arc(cx, cy, 5, 0, Math.PI * 2);
                    ctx.fillStyle = '#333';
                    ctx.fill();
                }
            };

            arcCanvas.update(0, null, null);
        }

        // ── AWA circle canvas ────────────────────────────────────────────────
        let awaCanvas;

        function initAWACircle() {
            const canvas = document.getElementById('awaCanvas');
            const ctx    = canvas.getContext('2d');
            const cx     = canvas.width  / 2;
            const cy     = canvas.height / 2;
            const r      = 120;

            function drawLine(angleDeg, color, width) {
                const rad = (angleDeg - 90) * Math.PI / 180;
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.lineTo(cx + r * Math.cos(rad), cy + r * Math.sin(rad));
                ctx.strokeStyle = color;
                ctx.lineWidth   = width;
                ctx.stroke();
            }

            awaCanvas = {
                update: function(inputDeg, correctedDeg) {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.beginPath();
                    ctx.arc(cx, cy, r, 0, 2 * Math.PI);
                    ctx.strokeStyle = '#ccc';
                    ctx.lineWidth   = 1;
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(cx, cy - r);
                    ctx.lineTo(cx, cy - r - 8);
                    ctx.strokeStyle = '#999';
                    ctx.lineWidth   = 2;
                    ctx.stroke();
                    drawLine(inputDeg,     'black', 2);
                    drawLine(correctedDeg, 'blue',  2);
                    ctx.beginPath();
                    ctx.arc(cx, cy, 4, 0, 2 * Math.PI);
                    ctx.fillStyle = '#333';
                    ctx.fill();
                }
            };
            awaCanvas.update(0, 0);
        }

        function updateAWACircle(inputDeg, correctedDeg) {
            if (awaCanvas) awaCanvas.update(inputDeg, correctedDeg);
        }

        // ── Boot ─────────────────────────────────────────────────────────────
        window.addEventListener('DOMContentLoaded', async function() {
            await loadConfig();
            initArc();
            initAWACircle();
            startStatusPolling();

            fetch(`${apiBase}/wind-correction`)
            .then(r => r.json())
            .then(data => {
                if (data.enabled !== undefined)
                    document.getElementById('wind-correction-toggle').checked = data.enabled;
            })
            .catch(err => console.error('Error getting wind correction state:', err));

            document.getElementById('wind-correction-toggle').addEventListener('change', function(e) {
                fetch(`${apiBase}/wind-correction?enabled=${e.target.checked}`)
                .then(r => r.json())
                .then(data => console.log('Wind correction:', data))
                .catch(err => console.error('Error toggling wind correction:', err));
            });

            document.getElementById('center-btn').addEventListener('click', function() {
                fetch(`${apiBase}/center`)
                .then(r => r.json())
                .then(data => console.log('Center result:', data))
                .catch(err => console.error('Error centering:', err));
            });

            document.getElementById('reset-btn').addEventListener('click', function() {
                fetch(`${apiBase}/reset`)
                .then(r => r.json())
                .then(data => console.log('Reset result:', data))
                .catch(err => console.error('Error resetting:', err));
            });
        });
    </script>
</body>
</html>
