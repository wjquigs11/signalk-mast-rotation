<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mast Rotation Angle</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1 style="text-align: center;">Mast Rotation Angle</h1>

        <div class="arc-container">
            <canvas id="arcCanvas" width="400" height="400"></canvas>
        </div>

        <div class="value-display">
            Mast Angle (mag): <span id="angle-mag-degrees" class="value">—</span>°
            &nbsp;|&nbsp;
            Mast Angle (true): <span id="angle-true-degrees" class="value" style="color:#1a6fc4;">—</span>°
            &nbsp;<span id="honey-display" style="display:none;">|&nbsp;
            Mast Angle (honey): <span id="angle-honey-degrees" class="value" style="color:#c47a1a;">—</span>°</span>
        </div>

        <div class="arc-legend">
            <span class="legend-item"><span class="legend-swatch" style="background:#222;"></span> Magnetic</span>
            <span class="legend-item"><span class="legend-swatch" style="background:#1a6fc4;"></span> True</span>
            <span id="honey-legend" class="legend-item" style="display:none;"><span class="legend-swatch" style="background:#c47a1a;"></span> Honeywell</span>
        </div>

        <div class="arc-container">
            <canvas id="awaCanvas" width="300" height="300"></canvas>
        </div>

        <div class="value-display">
            AWA: <span id="awa-value" class="value">0.0</span>° |
            AWS: <span id="aws-value" class="value">0.0</span> kts |
            Correct AWA: <span id="correct-awa-value" class="value" style="color:blue;">0.0</span>°
        </div>
        <div class="arc-container">
            <canvas id="hdgCanvas" width="350" height="350"></canvas>
        </div>

        <div class="value-display">
            <span style="color:#1a6fc4;">Pypilot:</span> <span id="boat-heading-pypilot" class="value" style="color:#1a6fc4;">—</span>° |
            <span style="color:#2a9d2a;">RTK:</span> <span id="boat-heading-rtk" class="value" style="color:#2a9d2a;">—</span>° |
            <span style="color:#9d2a9d;">ESP:</span> <span id="boat-heading-esp" class="value" style="color:#9d2a9d;">—</span>° |
            <span style="color:#c47a1a;">Mast:</span> <span id="mast-heading" class="value" style="color:#c47a1a;">—</span>°
        </div>
        <div class="arc-legend">
            <span class="legend-item"><span class="legend-swatch" style="background:#1a6fc4;"></span> Pypilot</span>
            <span class="legend-item"><span class="legend-swatch" style="background:#2a9d2a;"></span> RTK</span>
            <span class="legend-item"><span class="legend-swatch" style="background:#9d2a9d;"></span> ESP</span>
            <span class="legend-item"><span class="legend-swatch" style="background:#c47a1a;"></span> Mast</span>
        </div>
        <div class="value-display" style="font-size:14px; color:#888;">
            Offsets — Pypilot: <span id="offset-pypilot" class="value">0.0</span>° |
            ESP: <span id="offset-esp" class="value">0.0</span>° |
            Mast: <span id="offset-mast" class="value">0.0</span>°
        </div>

        <div class="toggle-container">
            <label class="toggle-label">
                <span>Wind Correction</span>
                <label class="switch">
                    <input type="checkbox" id="wind-correction-toggle" checked>
                    <span class="slider"></span>
                </label>
            </label>
        </div>

        <div class="controls">
            <button id="center-btn">Center</button>
            <button id="reset-btn">Reset</button>
        </div>
    </div>

    <script>
        let mastAngleMag = null;
        let mastAngleTrue = null;
        let mastAngleHoney = null;
        let honeyEnabled = false;
        let statusInterval;
        let apiBase = '/api';

        async function loadConfig() {
            try {
                const res = await fetch('/api-config');
                const cfg = await res.json();
                apiBase = cfg.apiBase;
            } catch (e) {
                console.warn('Could not load config:', e);
            }
        }

        function rad2deg(r) { return r * 180 / Math.PI; }

        function updateStatus() {
            fetch(`${apiBase}/status`)
            .then(r => r.json())
            .then(data => {
                // Mast angles
                mastAngleMag  = data.mastAngleMag;
                mastAngleTrue = data.mastAngleTrue;
                mastAngleHoney = data.mastAngleHoney;

                // Show/hide honey elements based on server config
                if (data.honeyEnabled && !honeyEnabled) {
                    honeyEnabled = true;
                    document.getElementById('honey-display').style.display = 'inline';
                    document.getElementById('honey-legend').style.display  = 'inline-flex';
                }

                const magDeg   = mastAngleMag   !== null ? rad2deg(mastAngleMag).toFixed(1)   : '—';
                const trueDeg  = mastAngleTrue  !== null ? rad2deg(mastAngleTrue).toFixed(1)  : '—';
                const honeyDeg = mastAngleHoney !== null ? rad2deg(mastAngleHoney).toFixed(1) : '—';
                document.getElementById('angle-mag-degrees').textContent   = magDeg;
                document.getElementById('angle-true-degrees').textContent  = trueDeg;
                document.getElementById('angle-honey-degrees').textContent = honeyDeg;

                arcCanvas.update(mastAngleMag, mastAngleTrue, mastAngleHoney);

                // Wind
                document.getElementById('awa-value').textContent         = data.inputAWADegrees.toFixed(1);
                document.getElementById('aws-value').textContent         = (data.inputAWS * 1.94384).toFixed(2);
                document.getElementById('correct-awa-value').textContent = data.outputAWADegrees.toFixed(1);

                // Headings (corrected = aligned to RTK after Center)
                const bPypilot = data.boatHeadingPypilotCorrected != null ? rad2deg(data.boatHeadingPypilotCorrected).toFixed(1) : '—';
                const bRTK     = data.boatHeadingRTKTrue != null ? rad2deg(data.boatHeadingRTKTrue).toFixed(1) : '—';
                const bESP     = data.boatHeadingESPCorrected != null ? rad2deg(data.boatHeadingESPCorrected).toFixed(1) : '—';
                const mastHdg  = data.canHeadingCorrected != null ? rad2deg(data.canHeadingCorrected).toFixed(1) : '—';
                document.getElementById('boat-heading-pypilot').textContent = bPypilot;
                document.getElementById('boat-heading-rtk').textContent     = bRTK;
                document.getElementById('boat-heading-esp').textContent      = bESP;
                document.getElementById('mast-heading').textContent              = mastHdg;

                // Offsets
                document.getElementById('offset-pypilot').textContent = rad2deg(data.pypilotOffset).toFixed(1);
                document.getElementById('offset-esp').textContent     = rad2deg(data.espOffset).toFixed(1);
                document.getElementById('offset-mast').textContent    = rad2deg(data.mastHeadingOffset).toFixed(1);

                // Update heading compass with corrected headings
                if (hdgCanvas) {
                    hdgCanvas.update(
                        data.boatHeadingPypilotCorrected,
                        data.boatHeadingRTKTrue,
                        data.boatHeadingESPCorrected,
                        data.canHeadingCorrected
                    );
                }

                updateAWACircle(data.inputAWADegrees, data.outputAWADegrees);
            })
            .catch(err => console.error('Error fetching status:', err));
        }

        function startStatusPolling() {
            updateStatus();
            statusInterval = setInterval(updateStatus, 1000);
        }

        // ── Mast arc canvas ──────────────────────────────────────────────────
        let arcCanvas;

        function initArc() {
            const canvas = document.getElementById('arcCanvas');
            const ctx    = canvas.getContext('2d');
            const cx     = canvas.width  / 2;
            const cy     = canvas.height / 2;
            const r      = 150;

            function drawNeedle(angle, color, width) {
                const a = angle + Math.PI / 2;
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.lineTo(cx + r * Math.cos(a), cy + r * Math.sin(a));
                ctx.strokeStyle = color;
                ctx.lineWidth   = width || 3;
                ctx.stroke();
            }

            arcCanvas = {
                update: function(angleMag, angleTrue, angleHoney) {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);

                    ctx.beginPath();
                    ctx.arc(cx, cy, r, 0, Math.PI);
                    ctx.strokeStyle = '#aaa';
                    ctx.lineWidth   = 2;
                    ctx.stroke();

                    [[-Math.PI/2, 'port'], [0, 'fwd'], [Math.PI/2, 'stbd']].forEach(([a, label]) => {
                        const ta = a + Math.PI / 2;
                        ctx.beginPath();
                        ctx.moveTo(cx + (r - 10) * Math.cos(ta), cy + (r - 10) * Math.sin(ta));
                        ctx.lineTo(cx + (r + 10) * Math.cos(ta), cy + (r + 10) * Math.sin(ta));
                        ctx.strokeStyle = '#bbb';
                        ctx.lineWidth   = 1;
                        ctx.stroke();
                    });

                    if (angleHoney !== null) drawNeedle(angleHoney, '#c47a1a', 2);
                    if (angleMag !== null)   drawNeedle(angleMag,   '#222',    3);
                    if (angleTrue !== null)  drawNeedle(angleTrue,  '#1a6fc4', 3);

                    ctx.beginPath();
                    ctx.arc(cx, cy, 5, 0, Math.PI * 2);
                    ctx.fillStyle = '#333';
                    ctx.fill();
                }
            };

            arcCanvas.update(0, null, null);
        }

        // ── AWA circle canvas ────────────────────────────────────────────────
        let awaCanvas;

        function initAWACircle() {
            const canvas = document.getElementById('awaCanvas');
            const ctx    = canvas.getContext('2d');
            const cx     = canvas.width  / 2;
            const cy     = canvas.height / 2;
            const r      = 120;

            function drawLine(angleDeg, color, width) {
                const rad = (angleDeg - 90) * Math.PI / 180;
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.lineTo(cx + r * Math.cos(rad), cy + r * Math.sin(rad));
                ctx.strokeStyle = color;
                ctx.lineWidth   = width;
                ctx.stroke();
            }

            awaCanvas = {
                update: function(inputDeg, correctedDeg) {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.beginPath();
                    ctx.arc(cx, cy, r, 0, 2 * Math.PI);
                    ctx.strokeStyle = '#ccc';
                    ctx.lineWidth   = 1;
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(cx, cy - r);
                    ctx.lineTo(cx, cy - r - 8);
                    ctx.strokeStyle = '#999';
                    ctx.lineWidth   = 2;
                    ctx.stroke();
                    drawLine(inputDeg,     'black', 2);
                    drawLine(correctedDeg, 'blue',  2);
                    ctx.beginPath();
                    ctx.arc(cx, cy, 4, 0, 2 * Math.PI);
                    ctx.fillStyle = '#333';
                    ctx.fill();
                }
            };
            awaCanvas.update(0, 0);
        }

        function updateAWACircle(inputDeg, correctedDeg) {
            if (awaCanvas) awaCanvas.update(inputDeg, correctedDeg);
        }

        // ── Heading compass canvas ───────────────────────────────────────────
        let hdgCanvas;

        function initHdgCompass() {
            const canvas = document.getElementById('hdgCanvas');
            const ctx    = canvas.getContext('2d');
            const cx     = canvas.width  / 2;
            const cy     = canvas.height / 2;
            const r      = 140;

            function drawNeedle(headingRad, color, width, len) {
                // heading in radians, 0 = North (up), clockwise positive
                const a = headingRad - Math.PI / 2; // rotate so 0 points up
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.lineTo(cx + len * Math.cos(a), cy + len * Math.sin(a));
                ctx.strokeStyle = color;
                ctx.lineWidth   = width;
                ctx.stroke();
            }

            function drawCompassRose() {
                // Outer circle
                ctx.beginPath();
                ctx.arc(cx, cy, r, 0, 2 * Math.PI);
                ctx.strokeStyle = '#ccc';
                ctx.lineWidth   = 1;
                ctx.stroke();

                // Cardinal ticks and labels
                const cardinals = [
                    { label: 'N', angle: -Math.PI/2 },
                    { label: 'E', angle: 0 },
                    { label: 'S', angle: Math.PI/2 },
                    { label: 'W', angle: Math.PI }
                ];
                ctx.font = '12px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                cardinals.forEach(({ label, angle }) => {
                    // Tick
                    ctx.beginPath();
                    ctx.moveTo(cx + (r - 8) * Math.cos(angle), cy + (r - 8) * Math.sin(angle));
                    ctx.lineTo(cx + (r + 2) * Math.cos(angle), cy + (r + 2) * Math.sin(angle));
                    ctx.strokeStyle = '#999';
                    ctx.lineWidth   = 2;
                    ctx.stroke();
                    // Label
                    ctx.fillStyle = '#666';
                    ctx.fillText(label, cx + (r + 14) * Math.cos(angle), cy + (r + 14) * Math.sin(angle));
                });

                // Minor ticks every 30°
                for (let deg = 0; deg < 360; deg += 30) {
                    if (deg % 90 === 0) continue;
                    const a = (deg - 90) * Math.PI / 180;
                    ctx.beginPath();
                    ctx.moveTo(cx + (r - 5) * Math.cos(a), cy + (r - 5) * Math.sin(a));
                    ctx.lineTo(cx + (r + 1) * Math.cos(a), cy + (r + 1) * Math.sin(a));
                    ctx.strokeStyle = '#ccc';
                    ctx.lineWidth   = 1;
                    ctx.stroke();
                }
            }

            hdgCanvas = {
                update: function(pypilotTrue, rtkTrue, espMag, mastHdg) {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    drawCompassRose();

                    // Draw needles (longest to shortest so shorter ones overlay)
                    if (pypilotTrue !== null) drawNeedle(pypilotTrue, '#1a6fc4', 3, r - 15);
                    if (rtkTrue !== null)     drawNeedle(rtkTrue,     '#2a9d2a', 3, r - 25);
                    if (espMag !== null)      drawNeedle(espMag,      '#9d2a9d', 2, r - 35);
                    if (mastHdg !== null)     drawNeedle(mastHdg,     '#c47a1a', 2, r - 45);

                    // Centre dot
                    ctx.beginPath();
                    ctx.arc(cx, cy, 4, 0, Math.PI * 2);
                    ctx.fillStyle = '#333';
                    ctx.fill();
                }
            };

            hdgCanvas.update(null, null, null, null);
        }

        // ── Boot ─────────────────────────────────────────────────────────────
        window.addEventListener('DOMContentLoaded', async function() {
            await loadConfig();
            initArc();
            initAWACircle();
            initHdgCompass();
            startStatusPolling();

            fetch(`${apiBase}/wind-correction`)
            .then(r => r.json())
            .then(data => {
                if (data.enabled !== undefined)
                    document.getElementById('wind-correction-toggle').checked = data.enabled;
            })
            .catch(err => console.error('Error getting wind correction state:', err));

            document.getElementById('wind-correction-toggle').addEventListener('change', function(e) {
                fetch(`${apiBase}/wind-correction?enabled=${e.target.checked}`)
                .then(r => r.json())
                .then(data => console.log('Wind correction:', data))
                .catch(err => console.error('Error toggling wind correction:', err));
            });

            document.getElementById('center-btn').addEventListener('click', function() {
                fetch(`${apiBase}/center`)
                .then(r => r.json())
                .then(data => console.log('Center result:', data))
                .catch(err => console.error('Error centering:', err));
            });

            document.getElementById('reset-btn').addEventListener('click', function() {
                fetch(`${apiBase}/reset`)
                .then(r => r.json())
                .then(data => console.log('Reset result:', data))
                .catch(err => console.error('Error resetting:', err));
            });
        });
    </script>
</body>
</html>
